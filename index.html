<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0B1E2B">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="manifest" href="/site.webmanifest">
  <title>Loco Por La Aventura — Eventos &amp; Reservas</title>
  <meta name="description" content="Eventos de aventura para la comunidad latina. Escalada, senderismo, talleres y más.">

  <!-- Warm up connections to the API + image CDN in parallel with the JS bundle -->
  <link rel="preconnect" href="https://locoporlaaventura.vercel.app" crossorigin>
  <link rel="preconnect" href="https://aftfpycpmbuqfrwspzzj.supabase.co" crossorigin>
  <link rel="dns-prefetch" href="https://aftfpycpmbuqfrwspzzj.supabase.co">

  <!-- Kick off the hero-slides fetch before React loads, then preload the
       first image with high priority so it downloads alongside the bundle. -->
  <script>
    (function () {
      try {
        window.__heroSlidesPromise = fetch('https://locoporlaaventura.vercel.app/api/hero-slides')
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (data) {
            if (Array.isArray(data) && data[0] && data[0].image_url) {
              var l = document.createElement('link');
              l.rel = 'preload';
              l.as = 'image';
              l.href = data[0].image_url;
              l.setAttribute('fetchpriority', 'high');
              document.head.appendChild(l);
            }
            return data;
          })
          .catch(function () { return []; });
      } catch (e) {}
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    body { margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); }
    input, select, textarea, button { font-size: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 767px) {
      body { -webkit-overflow-scrolling: touch; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
